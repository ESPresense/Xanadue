<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Xanadue Logo: House outline with price tag showing FREE -->
  <defs>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288D1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- House outline -->
  <g transform="translate(256, 256)">
    <!-- Roof -->
    <polygon points="-150,20 0,-130 150,20" fill="none" stroke="#333333" stroke-width="16" stroke-linejoin="round"/>
    <!-- Body -->
    <rect x="-120" y="20" width="240" height="160" fill="none" stroke="#333333" stroke-width="16" rx="4"/>
    <!-- Door -->
    <rect x="-30" y="100" width="60" height="80" fill="none" stroke="#333333" stroke-width="10" rx="2"/>
  </g>

  <!-- Price tag on the chimney -->
  <g transform="translate(350, 80) rotate(15)">
    <!-- String -->
    <line x1="0" y1="-30" x2="0" y2="-10" stroke="#666666" stroke-width="3"/>
    <!-- Tag -->
    <path d="M -35 -10 L 35 -10 L 55 10 L 35 30 L -35 30 L -55 10 Z" fill="#FF6B6B" stroke="#E55353" stroke-width="2"/>
    <!-- Text: $0.00 -->
    <text x="0" y="16" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="white">$0.00</text>
    <!-- Hole -->
    <circle cx="0" cy="-10" r="3" fill="none" stroke="#E55353" stroke-width="1.5"/>
  </g>
</svg>
